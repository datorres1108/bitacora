<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Bitácora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <!-- Buttons Excel -->
    <link href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body {
        background: #f4f6f9;
        }
        .card-kpi {
        border-radius: 12px;
        padding: 15px;
        color: white;
        }
        .kpi-1 { background:#4e73df; }
        .kpi-2 { background:#1cc88a; }
        .kpi-3 { background:#f6c23e; }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.7);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-content {
            text-align: center;
        }
        #loader {
            backdrop-filter: blur(4px);
        }
    </style>
</head>

<body>
<!-- LOADER -->
<div id="loader" class="d-none">
  <div class="loader-content text-center">
    <div class="spinner-border text-light" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 text-light">Cargando datos...</div>
  </div>
</div>
<div class="container py-4">
    <h4 class="mb-3">📊 Dashboard Bitácora Actividades Diarias</h4>
    <!-- FILTROS -->
    <div class="row mb-3">
    <div class="col-md-3">
        <input type="date" id="fechaInicio" class="form-control">
    </div>
    <div class="col-md-3">
        <input type="date" id="fechaFin" class="form-control">
    </div>
    <div class="col-md-3">
        <input type="text" id="filtroUsuario" class="form-control" placeholder="Filtrar por identificación">
    </div>
    <div class="col-md-3">
        <button onclick="cargarDatos()" class="btn btn-primary w-100">Filtrar</button>
    </div>
    </div>

    <!-- KPIs -->
    <div class="row mb-3">
    <div class="col-md-4">
        <div class="card-kpi kpi-1">
        <h6>Total Registros</h6>
        <h4 id="totalRegistros">0</h4>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card-kpi kpi-2">
        <h6>Actividad Principal</h6>
        <h4 id="actividadPrincipal" style="font-size: 1.1rem;">-</h4>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card-kpi kpi-3">
        <h6>Solicitudes Digitales</h6>
        <h4 id="totalDigitales">0</h4>
        </div>
    </div>
    </div>

    <!-- GRÁFICAS -->
    <div class="row mb-4">
        <div class="col-md-7">
            <canvas id="grafica"></canvas>
        </div>
        <div class="col-md-5">
            <canvas id="graficaPastel"></canvas>
        </div>
    </div>

    <!-- TABLA -->
    <table id="tabla" class="table table-striped w-100">
    <thead>
        <tr>
        <th>Fecha</th>
        <!-- <th>Hora Inicio</th>
        <th>Hora Fin</th> -->
        <!-- <th>Horas</th> -->
        <th>Tipo de Actividad</th>
        <th>Usuario Actividad</th>
        <th>Descripción</th>
        </tr>
    </thead>
    </table>

</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwlwLV6EmTOou8XVlS4dZ2h34o2gtsbdn7a0GS7jwJ2HZjh_0OPvLc9KKgzgQSvczA-RA/exec";
    let tabla;
    let grafica = null;
    let graficaPastel = null;

    function mostrarLoader() 
    {
        document.getElementById("loader").classList.remove("d-none");
    }

    function ocultarLoader() 
    {
        document.getElementById("loader").classList.add("d-none");
    }

    //cargar datos
    async function cargarDatos() {
        mostrarLoader(); // 🔥 ACTIVAR
        try {

            const f1 = document.getElementById("fechaInicio").value;
            const f2 = document.getElementById("fechaFin").value;
            const usuario = document.getElementById("filtroUsuario").value;

            let url = API_URL;

            if (f1 && f2) {
            url += `?fechaInicio=${f1}&fechaFin=${f2}`;
            }

            const res = await fetch(url);
            let data = await res.json();

            if (usuario) {
            data = data.filter(d =>
                String(d.Identificacion || "").includes(usuario)
            );
            }

            const conteoTipos = {};
            let totalDigitales = 0;
            const nombresTipos = {
                "PRS": "PRS Generado en Página",
                "SC": "Solicitud por Correo",
                "SW": "Solicitud por Whatsapp",
                "ST": "Solicitud por Teléfono",
                "TM": "Solicitud por Teams",
                "OT": "Otro"
            };

            data.forEach(d => {
                d.Fecha = formatearFecha(d.Fecha);
                
                // Mapear el ID al nombre descriptivo
                const tid = d.tipoId || d.TipoId || d.tipoID || d.TipoID || "";
                d.TipoActividadNombre = nombresTipos[tid] || tid || "Otro";

                // Acumuladores para KPIs
                conteoTipos[tid] = (conteoTipos[tid] || 0) + 1;
                if (["PRS", "SC", "SW"].includes(tid)) {
                    totalDigitales++;
                }
            });

            // Determinar la actividad más frecuente (Moda)
            let maxTipo = "N/A";
            let maxValor = 0;
            Object.keys(conteoTipos).forEach(key => {
                if (conteoTipos[key] > maxValor) {
                    maxValor = conteoTipos[key];
                    maxTipo = nombresTipos[key] || key;
                }
            });

            document.getElementById("totalRegistros").innerText = data.length;
            document.getElementById("actividadPrincipal").innerText = maxTipo;
            document.getElementById("totalDigitales").innerText = totalDigitales;

            cargarTabla(data);
            cargarGrafica(data);

        } catch (error) {

            console.error(error);
            alert("Error cargando datos");

        } finally {

            ocultarLoader(); // 🔥 SIEMPRE OCULTA

        }
    }

    //gráfica
    function cargarGrafica(data) 
    {
        const conteo = {};
        data.forEach(r => {
            conteo[r.TipoActividadNombre] = (conteo[r.TipoActividadNombre] || 0) + 1;
        });

        const labels = Object.keys(conteo);
        const values = Object.values(conteo);
        const colors = [
            'rgba(78, 115, 223, 0.7)',  // Azul
            'rgba(28, 200, 138, 0.7)',  // Verde
            'rgba(246, 194, 62, 0.7)',  // Amarillo
            'rgba(231, 74, 59, 0.7)',   // Rojo
            'rgba(54, 185, 204, 0.7)'   // Cian
        ];

        if (grafica) grafica.destroy();
        if (graficaPastel) graficaPastel.destroy();

        grafica = new Chart(document.getElementById("grafica"), {
            type: "bar",
            data: {
            labels: labels,
            datasets: [{ 
                label: 'Cantidad de Actividades',
                data: values,
                backgroundColor: colors,
                borderWidth: 1
            }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            stepSize: 1
                        }
                    }
                }
            }
        });

        graficaPastel = new Chart(document.getElementById("graficaPastel"), {
            type: "pie",
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }

    //tabla con Excel
    function cargarTabla(data) 
    {
        if (tabla) tabla.destroy();
        tabla = $('#tabla').DataTable({
            data: data,
            dom: 'Bfrtip',
            buttons: [
            {
                extend: 'excelHtml5',
                text: 'Descargar Excel',
                title: 'Bitacora'
            }
            ],
            columns: [
            { data: 'Fecha' },
            // { data: 'HoraInicio' },
            // { data: 'HoraFin' },
            // { data: 'horas' },
            { data: 'TipoActividadNombre' },
            { data: 'Identificacion' },
            { data: 'Descripcion' }
            ]
        });
    }

    //funciones para fecha y horas 
    function formatearFecha(fechaISO) 
    {
        if (!fechaISO) return "";
            const fecha = new Date(fechaISO);
            const year = fecha.getFullYear();
            const month = String(fecha.getMonth() + 1).padStart(2, "0");
            const day = String(fecha.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
    }

    function formatearHora(fechaISO) 
    {
        if (!fechaISO) return "";
        const fecha = new Date(fechaISO);
        const horas = String(fecha.getHours()).padStart(2, "0");
        const minutos = String(fecha.getMinutes()).padStart(2, "0");
        return `${horas}:${minutos}`;
    }
    // iniciar
    cargarDatos();
</script>
<footer class="text-center py-4 bg-white border-top">
    <p class="small text-muted mb-0">By <a href="https://datorres1108.github.io/cv/" target="_blank"> Datorres </a>© 2026 | Version 1-20260418 </p>
</footer>
</body>
</html>
